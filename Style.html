<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#162033;--muted:#6b7280;--pri:#1d4ed8;--line:#e5e7eb;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}.hidden{display:none!important}.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.brand-card{width:min(420px,100%);background:var(--card);border-radius:28px;padding:28px;box-shadow:0 20px 50px #0001}.logo{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#1d4ed8,#06b6d4);color:#fff;display:grid;place-items:center;font-weight:900;font-size:32px}h1,h2,h3{margin:.2em 0 .6em}label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px;background:#fff;font-size:16px}button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;background:#e5e7eb;color:var(--text)}button.primary{background:var(--pri);color:#fff;width:100%;margin-top:16px}.ghost{background:#fff;border:1px solid var(--line)}.app{padding:72px 14px 92px;max-width:980px;margin:0 auto}.topbar{position:fixed;top:0;left:0;right:0;height:58px;background:#ffffffcc;backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;z-index:5;border-bottom:1px solid var(--line)}#versionBadge{display:block;font-size:11px;color:var(--muted)}.page{display:none}.page.active{display:block}.grid{display:grid;gap:10px}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin:10px 0;box-shadow:0 8px 20px #00000008}.card span{display:block;color:var(--muted);font-size:12px}.card b{font-size:28px}.card small,.muted{color:var(--muted)}.small{font-size:12px}.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.item-grid .item{background:#f8fafc;border:1px solid va </style>

<style>
.page-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}.page-title-row h2{margin-bottom:2px}.input-panel{padding-bottom:88px}.input-basic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.input-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0 8px}.input-toolbar b{display:block}.input-toolbar small{display:block}.compact-actions button{padding:9px 10px;font-size:13px}.item-grid.enhanced{grid-template-columns:1fr;gap:10px}.input-card{padding:12px}.input-card.required{border-color:#bfdbfe;background:#eff6ff}.item-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.item-head label{margin:0;color:var(--text);font-weight:800}.item-head small{font-size:11px;color:var(--pri);background:#dbeafe;border-radius:999px;padding:3px 7px}.step-input{display:grid;grid-template-columns:minmax(44px,56px) minmax(0,1fr) minmax(44px,56px);gap:8px;align-items:center}.step-input button{min-height:44px;padding:0;font-size:22px;border-radius:12px;touch-action:manipulation}.step-input input{min-height:44px;text-align:center;font-size:18px;font-weight:800;padding:10px 8px;min-width:0;touch-action:manipulation;pointer-events:auto;-webkit-user-select:text;user-select:text;line-height:1.2}.step-input input::-webkit-outer-spin-button,.step-input input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.step-input input[type=number]{-moz-appearance:textfield}.save-sticky{position:sticky;bottom:84px;z-index:4;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#ffffffee;backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;padding:10px 12px;box-shadow:0 12px 34px #0002;margin-top:14px}.save-sticky b{display:block;font-size:16px}.save-sticky button.primary{width:auto;min-width:132px;margin:0}button:disabled{opacity:.65}.input-page .panel h3{margin-bottom:10px}@media(max-width:759px){.step-input{gr
